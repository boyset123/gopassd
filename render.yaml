# Optional: in Render → New → Blueprint, connect this repo and apply.
# Your live URL may differ (e.g. https://gopassd.onrender.com) — copy it from Render → Service → Settings.
#
# Required env vars on Render:
#   MONGODB_URI, JWT_SECRET, FIREBASE_SERVICE_ACCOUNT_JSON
#   EMAIL_USER — full Gmail address (e.g. you@gmail.com)
#   EMAIL_PASS — Google App Password (Account → Security → App passwords; 2FA required)
# MongoDB Atlas: Network Access must allow 0.0.0.0/0 or Render outbound IPs.
services:
  - type: web
    name: gopassdorsu-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
